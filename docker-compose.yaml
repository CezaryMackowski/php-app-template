services:
  fpm:
    container_name: app-fpm
    hostname: app-fpm
    build:
      context: .
      dockerfile: docker/fpm/Dockerfile
      target: php-fpm-dev
    volumes:
      - .:/app/
    user: app-user
    extra_hosts:
        - host.docker.internal:host-gateway
    environment:
        - PHP_IDE_CONFIG=serverName=Docker
    depends_on:
      - db
      - nginx

  nginx:
    container_name: app-nginx
    hostname: app-nginx
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      target: nginx-dev
    volumes:
      - .:/app
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"

  db:
    container_name: app-postgres
    hostname: app-postgres
    image: postgres:17.0-bullseye
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app-pass
      POSTGRES_DB: app-db
    healthcheck:
      test: [ "CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}" ]
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local
